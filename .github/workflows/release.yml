name: CI / Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number) || (github.ref_type == 'tag' && format('release-{0}', github.ref_name) || 'release-dev') }}
  cancel-in-progress: false

jobs:
  verify:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI checks
        run: bun run ci

  meta:
    name: Resolve release metadata
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      notes: ${{ steps.meta.outputs.notes }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      title: ${{ steps.meta.outputs.title }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        run: |
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y%m%d)"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}" >&2
              exit 1
            fi
            VERSION="${PKG_VERSION}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            CHANNEL="stable"
            TITLE="${GITHUB_REF_NAME}"
            PRERELEASE="false"
            NOTES="Release ${GITHUB_REF_NAME}"
          else
            RUN_NUMBER="$(printf "%04d" "${GITHUB_RUN_NUMBER}")"
            VERSION="dev-${RUN_NUMBER}-${BUILD_DATE}-${SHORT_SHA}"
            RELEASE_TAG="dev"
            CHANNEL="dev"
            TITLE="Dev Build (${VERSION})"
            PRERELEASE="true"
            printf -v NOTES 'Automated pre-release from `%s` branch.\n\nVersion: `%s`\nCommit: %s' \
              "${GITHUB_REF_NAME}" "${VERSION}" "${SHORT_SHA}"
          fi

          {
            echo "channel=${CHANNEL}"
            echo "prerelease=${PRERELEASE}"
            echo "release_tag=${RELEASE_TAG}"
            echo "title=${TITLE}"
            echo "version=${VERSION}"
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.asset }}
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            asset: ao3-hub-darwin-arm64
          - target: bun-darwin-x64
            asset: ao3-hub-darwin-x64
          - target: bun-linux-arm64
            asset: ao3-hub-linux-arm64
          - target: bun-linux-x64
            asset: ao3-hub-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          AO3HUB_TARGET="${{ matrix.target }}" \
          AO3HUB_OUT="${{ matrix.asset }}" \
          AO3HUB_VERSION="${{ needs.meta.outputs.version }}" \
          bun run build

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: server/build/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish ${{ needs.meta.outputs.channel }} OTA release
    needs:
      - meta
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: server/build/release
          merge-multiple: true

      - name: Prepare release assets
        run: |
          cp server/scripts/launcher.sh server/build/release/launcher.sh
          chmod +x server/build/release/ao3-hub-* server/build/release/launcher.sh
          bun run ota:manifest -- \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ needs.meta.outputs.release_tag }}" \
            --version "${{ needs.meta.outputs.version }}" \
            --channel "${{ needs.meta.outputs.channel }}" \
            --notes "${{ needs.meta.outputs.notes }}" \
            --out server/build/release/manifest.json \
            server/build/release/ao3-hub-*
          (cd server/build/release && sha256sum ao3-hub-* manifest.json launcher.sh > SHA256SUMS)

      - name: Move dev tag
        if: needs.meta.outputs.channel == 'dev'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ needs.meta.outputs.release_tag }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ needs.meta.outputs.release_tag }}" --force

      - name: Publish stable release
        if: needs.meta.outputs.channel == 'stable'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.meta.outputs.release_tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" server/build/release/* --clobber
          else
            gh release create "${TAG}" server/build/release/* \
              --title "${{ needs.meta.outputs.title }}" \
              --generate-notes \
              --verify-tag
          fi

      - name: Publish dev release
        if: needs.meta.outputs.channel == 'dev'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.meta.outputs.release_tag }}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" \
              --title "${{ needs.meta.outputs.title }}" \
              --notes "${{ needs.meta.outputs.notes }}" \
              --prerelease
            gh release upload "${TAG}" server/build/release/* --clobber
          else
            gh release create "${TAG}" server/build/release/* \
              --title "${{ needs.meta.outputs.title }}" \
              --notes "${{ needs.meta.outputs.notes }}" \
              --prerelease \
              --verify-tag
          fi
