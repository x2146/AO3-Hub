name: CI / Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.event.pull_request.number) || (github.ref_type == 'tag' && format('release-{0}', github.ref_name) || 'release-dev') }}
  cancel-in-progress: false

jobs:
  verify:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci

      - name: Run CI checks
        run: npm run ci

  meta:
    name: Resolve release metadata
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.meta.outputs.channel }}
      notes: ${{ steps.meta.outputs.notes }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      published_at: ${{ steps.meta.outputs.published_at }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      title: ${{ steps.meta.outputs.title }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve metadata
        id: meta
        run: |
          PKG_VERSION="$(node -p 'require("./package.json").version')"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y%m%d)"
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}" >&2
              exit 1
            fi
            VERSION="${PKG_VERSION}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            CHANNEL="stable"
            TITLE="${GITHUB_REF_NAME}"
            PRERELEASE="false"
            NOTES="Release ${GITHUB_REF_NAME}"
          else
            RUN_NUMBER="$(printf "%04d" "${GITHUB_RUN_NUMBER}")"
            VERSION="dev-${RUN_NUMBER}-${BUILD_DATE}-${SHORT_SHA}"
            RELEASE_TAG="dev"
            CHANNEL="dev"
            TITLE="Dev Build (${VERSION})"
            PRERELEASE="true"
            printf -v NOTES 'Automated pre-release from `%s` branch.\n\nVersion: `%s`\nCommit: %s' \
              "${GITHUB_REF_NAME}" "${VERSION}" "${SHORT_SHA}"
          fi

          {
            echo "channel=${CHANNEL}"
            echo "prerelease=${PRERELEASE}"
            echo "published_at=${PUBLISHED_AT}"
            echo "release_tag=${RELEASE_TAG}"
            echo "title=${TITLE}"
            echo "version=${VERSION}"
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.asset }}
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            asset: ao3-hub-darwin-arm64
          - target: darwin-x64
            asset: ao3-hub-darwin-x64
          - target: linux-arm64
            asset: ao3-hub-linux-arm64
          - target: linux-x64
            asset: ao3-hub-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci

      - name: Build binary
        run: |
          AO3HUB_TARGET="${{ matrix.target }}" \
          AO3HUB_OUT="${{ matrix.asset }}" \
          AO3HUB_VERSION="${{ needs.meta.outputs.version }}" \
          AO3HUB_BUILT_AT="${{ needs.meta.outputs.published_at }}" \
          npm run build

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: server/build/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish ${{ needs.meta.outputs.channel }} OTA release
    needs:
      - meta
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: server/build/release
          merge-multiple: true

      - name: Prepare release assets
        env:
          AO3HUB_RELEASE_CHANNEL: ${{ needs.meta.outputs.channel }}
          AO3HUB_RELEASE_NOTES: ${{ needs.meta.outputs.notes }}
          AO3HUB_RELEASE_PUBLISHED_AT: ${{ needs.meta.outputs.published_at }}
          AO3HUB_RELEASE_REPO: ${{ github.repository }}
          AO3HUB_RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
          AO3HUB_RELEASE_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          cp server/scripts/launcher.sh server/build/release/launcher.sh
          chmod +x server/build/release/ao3-hub-* server/build/release/launcher.sh
          go run ./cmd/ao3hub-manifest \
            --repo "${AO3HUB_RELEASE_REPO}" \
            --tag "${AO3HUB_RELEASE_TAG}" \
            --version "${AO3HUB_RELEASE_VERSION}" \
            --channel "${AO3HUB_RELEASE_CHANNEL}" \
            --notes "${AO3HUB_RELEASE_NOTES}" \
            --published-at "${AO3HUB_RELEASE_PUBLISHED_AT}" \
            --out server/build/release/manifest.json \
            server/build/release/ao3-hub-*
          (cd server/build/release && sha256sum ao3-hub-* manifest.json launcher.sh > SHA256SUMS)

      - name: Move dev tag
        if: needs.meta.outputs.channel == 'dev'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_DATE="${{ needs.meta.outputs.published_at }}" \
            git tag -fa "${{ needs.meta.outputs.release_tag }}" "${GITHUB_SHA}" \
              -m "Dev build ${{ needs.meta.outputs.version }}"
          git push origin "refs/tags/${{ needs.meta.outputs.release_tag }}" --force

      - name: Publish stable release
        if: needs.meta.outputs.channel == 'stable'
        env:
          AO3HUB_RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
          AO3HUB_RELEASE_TITLE: ${{ needs.meta.outputs.title }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${AO3HUB_RELEASE_TAG}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" server/build/release/* --clobber
          else
            gh release create "${TAG}" server/build/release/* \
              --title "${AO3HUB_RELEASE_TITLE}" \
              --generate-notes \
              --verify-tag
          fi

      - name: Publish dev release
        if: needs.meta.outputs.channel == 'dev'
        env:
          AO3HUB_RELEASE_NOTES: ${{ needs.meta.outputs.notes }}
          AO3HUB_RELEASE_TAG: ${{ needs.meta.outputs.release_tag }}
          AO3HUB_RELEASE_TITLE: ${{ needs.meta.outputs.title }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${AO3HUB_RELEASE_TAG}"
          NOTES_FILE="$(mktemp)"
          printf '%s\n' "${AO3HUB_RELEASE_NOTES}" > "${NOTES_FILE}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release delete "${TAG}" --yes
          fi
          gh release create "${TAG}" server/build/release/* \
            --title "${AO3HUB_RELEASE_TITLE}" \
            --notes-file "${NOTES_FILE}" \
            --prerelease \
            --verify-tag
